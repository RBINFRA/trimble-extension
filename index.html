<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propriétés</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #eeeeee;
      color: #111111;
    }
    #header {
      background: #f6f6f6;
      color: #4a90e2;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      border-bottom: 1px solid #6da7ec;
    }
    #branch {
      font-size: 11px;
      font-weight: 500;
      background: #e8f1fe;
      color: #4a90e2;
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    #status {
      padding: 10px 14px;
      font-size: 12px;
      color: #5e6670;
      background: #f6f6f6;
      border-bottom: 1px solid #c7d7ef;
      min-height: 36px;
    }
    #status.error { color: #c0392b; }
    #status.ok    { color: #2d8f4e; }
    #content { padding: 14px; }
    .pset-section + .pset-section { margin-top: 18px; }
    .no-selection {
      color: #999;
      font-style: italic;
      text-align: center;
      margin-top: 30px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border: 2px solid #6da7ec;
    }
    .section-heading {
      padding: 4px 10px;
      text-align: center;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      text-decoration: underline;
      color: #4a90e2;
      letter-spacing: 0.4px;
      border-bottom: 1px solid #6da7ec;
    }
    td {
      padding: 6px 10px;
      border-bottom: 1px solid #6da7ec;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: 0; }
    td:first-child {
      width: 34%;
      text-transform: uppercase;
      border-right: 1px solid #6da7ec;
      word-break: break-word;
    }
    td:last-child {
      word-break: break-word;
    }
    .value-present {
      color: #2aa84a;
      font-weight: 600;
    }
    .value-missing {
      color: #7c8794;
      font-style: italic;
    }
    .empty-pset {
      color: #7c8794;
      font-style: italic;
      text-align: center;
      padding: 10px 0;
    }
  </style>
</head>
<body>
  <div id="header">
    <span>Propriétés</span>
    <span id="branch">Branche active : chargement…</span>
  </div>
  <div id="status">Connexion à Trimble Connect…</div>
  <div id="content">
    <p class="no-selection">Sélectionnez un objet dans la maquette.</p>
  </div>

  <!-- CDN officiel Trimble — IIFE, servi par components.connect.trimble.com -->
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  <script src="app.js"></script>
</body>
</html>
